<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saas Landing Page</title>
  <link rel="stylesheet" href="./style.css">
  <script src="https://kit.fontawesome.com/5632ce05bc.js" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="./images/logo.png" alt="Logo" />
    </div>
    <ul class="navbar__list">
      <li>Demos</li>
      <li>Pages</li>
      <li>Support</li>
      <li>Contact</li>
    </ul>
    <button class="navbar__button">
      Get started for free 
    </button>
    <div class="menu-icon">
      <i class="fa-solid fa-bars icon-fill"></i>
    </div>
  </nav>
  <header class="header">
    <div class="header__top">
      <h1>Get things done by awesome remote team</h1>
      <p>
        We share common trends and strategies for improving your
        rental income and making sure you stay in high demand.
      </p>
      <div class="hero__buttons">
        <button class="hero__button">
          <span>Get started for free</span>
          <img src="./images/tail-right.png" alt="tail right" />
        </button>
        <button class="ghost__button">
          Learn more
        </button>
      </div>
    </div>
    <div class="header__bottom">
      <img src="./images/hero-image.png" alt="Hero" />
    </div>
  </header>
</body>
</html>
